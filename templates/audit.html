<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infrastructure Sentinel — Audit Forge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="audit" class="sentinel-body-offset">
  <header class="sentinel-page-header">
    <div class="sentinel-toolbar-group">
      <a href="/" class="sentinel-quiet-link sentinel-action-scale" data-i18n="backToLanding">Back</a>
      <strong data-i18n="auditForgeTitle">Audit Forge</strong>
    </div>
    <div class="sentinel-toolbar-group">
      <select id="language-select" class="sentinel-field sentinel-action-scale">
        <option value="en">English</option>
        <option value="ru">Русский</option>
        <option value="hy">Հայերեն</option>
      </select>
      <input id="subnet-input" class="sentinel-field sentinel-action-scale" type="text" data-i18n-placeholder="subnetPlaceholder" placeholder="">
      <button type="button" id="run-audit-button" class="sentinel-chip-btn sentinel-chip-primary sentinel-action-scale" data-i18n="runAudit">Run Audit</button>
    </div>
  </header>
  <div class="sentinel-main" style="padding-top:8px;">
    <div class="sentinel-panel sentinel-panel-lift sentinel-fade-up">
      <p style="margin:0;color:var(--text-muted);line-height:1.46" data-i18n="auditHint">Safe whitelist ports are ignored by default; only anomalies are listed.</p>
    </div>
    <div class="sentinel-panel sentinel-panel-lift sentinel-fade-up">
      <div class="sentinel-toolbar" style="margin-bottom:12px">
        <div data-i18n="anomalousPorts">Anomalous Open Ports</div>
        <span id="anomaly-count">0</span>
      </div>
      <div class="sentinel-table-wrap sentinel-table-soft">
      <table class="hosts-table sentinel-data-table" style="width:100%">
        <thead>
          <tr>
            <th data-i18n="ip">IP</th>
            <th data-i18n="port">Port</th>
            <th data-i18n="protocol">Protocol</th>
            <th data-i18n="service">Service</th>
            <th data-i18n="process">Process</th>
          </tr>
        </thead>
        <tbody id="network-table-body"></tbody>
      </table>
      </div>
    </div>
    <div class="sentinel-panel sentinel-panel-lift sentinel-fade-up">
      <strong data-i18n="aiRemediation">AI Remediation Plan</strong>
      <div id="remediation-list" style="margin-top:12px;color:var(--text-muted)"></div>
    </div>
    <div class="sentinel-panel sentinel-ai-card sentinel-panel-lift sentinel-fade-up">
      <strong data-i18n="vulnPlaybookHeading">Version-aware threat playbooks</strong>
      <div id="vulnerability-advisory-root" style="margin-top:12px"></div>
    </div>
    <div class="sentinel-panel sentinel-panel-lift sentinel-fade-up">
      <strong data-i18n="rawPayload">Raw Payload</strong>
      <pre id="audit-raw" style="margin-top:12px;white-space:pre-wrap;color:var(--text-muted);font-family:var(--font-mono)"></pre>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
