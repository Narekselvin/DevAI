<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infrastructure Sentinel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="landing" class="sentinel-body-offset">
  <div class="sentinel-landing-topbar">
    <select id="language-select" class="sentinel-field sentinel-focus-pulse">
      <option value="en">English</option>
      <option value="ru">Русский</option>
      <option value="hy">Հայերեն</option>
    </select>
  </div>
  <div class="sentinel-landing-wrap">
    <div class="sentinel-route-grid">
      <a class="sentinel-route-card sentinel-action-scale" href="/audit">
        <div class="sentinel-route-title" data-i18n="landingAuditTitle">Network Audit</div>
        <div class="sentinel-route-sub" data-i18n="landingAuditSubtitle">Run smart scanning with noise reduction and AI remediation</div>
      </a>
      <a class="sentinel-route-card sentinel-action-scale" href="/monitoring">
        <div class="sentinel-route-title" data-i18n="landingMonitoringTitle">Infrastructure Sentinel Console</div>
        <div class="sentinel-route-sub" data-i18n="landingMonitoringSubtitle">Hosted observability cockpit with multilingual AI decisions</div>
      </a>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
