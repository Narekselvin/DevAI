<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infrastructure Monitoring</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,sans-serif}
    .layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
    .sidebar{background:#0f172a;border-right:1px solid #1f2937;padding:14px;position:fixed;top:0;left:0;bottom:0;width:260px;box-sizing:border-box}
    .content{margin-left:260px;padding:18px}
    .brand{font-weight:900;margin-bottom:12px}
    .nav{display:grid;gap:8px;margin-bottom:14px}
    .nav button{width:100%;text-align:left;background:#111827;border:1px solid #1f2937;color:#e5e7eb;border-radius:12px;padding:12px;cursor:pointer}
    .nav button.active{border-color:#2563eb}
    .topcontrols{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    select,input,button{border:1px solid #334155;background:#0b1220;color:#e5e7eb;border-radius:10px;padding:10px 12px}
    button.primary{background:#2563eb;border-color:#2563eb;cursor:pointer}
    .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:14px;margin-bottom:14px}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #1f2937;text-align:left;padding:8px;font-size:14px}
    .muted{color:#94a3b8}
    .view{display:none}
    .view.active{display:block}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    pre{white-space:pre-wrap;background:#0b1220;border:1px solid #1f2937;border-radius:12px;padding:12px;overflow:auto}
    @media (max-width:940px){.layout{grid-template-columns:1fr}.sidebar{position:relative;width:100%}.content{margin-left:0}}
  </style>
</head>
<body data-page="monitoring">
  <div class="layout">
    <aside class="sidebar">
      <div class="brand" data-i18n="monitoringTitle">Infrastructure Monitoring</div>
      <div class="topcontrols">
        <a href="/" style="color:#e5e7eb;text-decoration:none" data-i18n="backToLanding">Back</a>
        <select id="language-select">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="hy">Հայերեն</option>
        </select>
      </div>
      <div class="nav">
        <button class="nav-btn active" data-view="hosts" data-i18n="menuHosts">Hosts</button>
        <button class="nav-btn" data-view="live" data-i18n="menuLive">Live Dashboard</button>
        <button class="nav-btn" data-view="ai" data-i18n="menuAi">AI Decisions</button>
      </div>
      <div class="muted" data-i18n="monitoringSidebarHint">Add hosts, poll metrics, then review AI trend decisions.</div>
    </aside>
    <main class="content">
      <section id="view-hosts" class="view active">
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <div data-i18n="hostsTitle">Hosts</div>
            <button class="primary" id="refresh-hosts" data-i18n="refresh">Refresh</button>
          </div>
        </div>
        <div class="panel">
          <div class="grid2">
            <input id="host-id" type="text" placeholder="id" disabled>
            <select id="host-device-type">
              <option value="Server" data-i18n="deviceServer">Server</option>
              <option value="Switch" data-i18n="deviceSwitch">Switch</option>
              <option value="VM" data-i18n="deviceVm">VM</option>
            </select>
            <input id="host-hostname" type="text" placeholder="Hostname">
            <input id="host-ip" type="text" placeholder="IP address">
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
            <button class="primary" id="create-host" data-i18n="addHost">Add</button>
            <button class="primary" id="update-host" data-i18n="updateHost">Update</button>
            <button id="clear-host" data-i18n="clear">Clear</button>
          </div>
        </div>
        <div class="panel">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th data-i18n="hostname">Hostname</th>
                <th data-i18n="ip">IP</th>
                <th data-i18n="deviceType">Device Type</th>
                <th data-i18n="dateAdded">Date Added</th>
                <th data-i18n="actions">Actions</th>
              </tr>
            </thead>
            <tbody id="hosts-table-body"></tbody>
          </table>
        </div>
      </section>

      <section id="view-live" class="view">
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <div data-i18n="liveTitle">Live Dashboard</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="primary" id="poll-metrics" data-i18n="pollNow">Poll Now</button>
              <button class="primary" id="refresh-metrics" data-i18n="refresh">Refresh</button>
            </div>
          </div>
        </div>
        <div class="panel">
          <table>
            <thead>
              <tr>
                <th data-i18n="hostname">Hostname</th>
                <th data-i18n="ip">IP</th>
                <th data-i18n="deviceType">Device Type</th>
                <th data-i18n="cpu">CPU %</th>
                <th data-i18n="ram">RAM %</th>
                <th data-i18n="disk">Disk %</th>
                <th data-i18n="temp">Temp C</th>
                <th data-i18n="status">Status</th>
                <th data-i18n="polledAt">Polled At</th>
              </tr>
            </thead>
            <tbody id="metrics-table-body"></tbody>
          </table>
        </div>
      </section>

      <section id="view-ai" class="view">
        <div class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
            <div data-i18n="aiDecisionsTitle">AI Decisions</div>
            <button class="primary" id="refresh-ai" data-i18n="refresh">Refresh</button>
          </div>
        </div>
        <div id="ai-decisions"></div>
      </section>
    </main>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
