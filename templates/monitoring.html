<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="documentMonitoringTitle">Infrastructure Sentinel Vigil Console</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body data-page="monitoring" class="sentinel-console">
  <div class="sentinel-shell">
    <aside class="sentinel-sidebar sentinel-stagger-enter">
      <div class="sentinel-brand">
        <div class="sentinel-brand-mark"></div>
        <div class="sentinel-brand-text">
          <div class="sentinel-brand-title" data-i18n="brandTitle">Infrastructure Sentinel</div>
          <div class="sentinel-brand-caption" data-i18n="monitoringSubtitle">Localized AI auditing and observability</div>
        </div>
      </div>
      <div class="sentinel-sidebar-actions">
        <a class="sentinel-quiet-link sentinel-focus-pulse" href="/" data-i18n="backToLanding">Back</a>
        <select id="language-select" class="sentinel-field sentinel-focus-pulse">
          <option value="en">English</option>
          <option value="ru">Русский</option>
          <option value="hy">Հայերեն</option>
        </select>
      </div>
      <nav class="sentinel-nav">
        <button type="button" class="sentinel-nav-btn nav-btn sentinel-focus-pulse active" data-view="hosts" data-i18n="menuHosts">Hosts</button>
        <button type="button" class="sentinel-nav-btn nav-btn sentinel-focus-pulse" data-view="live" data-i18n="menuLive">Live Dashboard</button>
        <button type="button" class="sentinel-nav-btn nav-btn sentinel-focus-pulse" data-view="ai" data-i18n="menuAi">AI Decisions</button>
      </nav>
      <p class="sentinel-sidebar-hint" data-i18n="monitoringSidebarHint">Add hosts, poll metrics, then review AI trend decisions.</p>
    </aside>
    <main class="sentinel-main">
      <section id="view-hosts" class="sentinel-view view active sentinel-stagger-enter">
        <div class="sentinel-toolbar">
          <h1 class="sentinel-view-title" data-i18n="hostsTitle">Hosts</h1>
          <button type="button" class="sentinel-chip-btn sentinel-chip-primary sentinel-action-scale" id="refresh-hosts" data-i18n="refresh">Refresh</button>
        </div>
        <div class="sentinel-panel sentinel-panel-lift sentinel-fade-up">
          <div class="sentinel-host-form-grid">
            <input id="host-id" class="sentinel-field" type="text" disabled data-i18n-placeholder="hostInternalIdPlaceholder" placeholder="">
            <select id="host-device-type" class="sentinel-field sentinel-action-scale">
              <option value="Server" data-i18n="deviceServer">Server</option>
              <option value="Switch" data-i18n="deviceSwitch">Switch</option>
              <option value="VM" data-i18n="deviceVm">VM</option>
            </select>
            <input id="host-hostname" class="sentinel-field sentinel-action-scale" type="text" data-i18n-placeholder="hostHostnamePlaceholder" placeholder="">
            <input id="host-ip" class="sentinel-field sentinel-action-scale" type="text" data-i18n-placeholder="hostIpPlaceholder" placeholder="">
          </div>
          <div class="sentinel-form-actions">
            <button type="button" class="sentinel-chip-btn sentinel-chip-primary sentinel-action-scale" id="create-host" data-i18n="addHost">Add</button>
            <button type="button" class="sentinel-chip-btn sentinel-chip-warn sentinel-action-scale" id="update-host" data-i18n="updateHost">Update</button>
            <button type="button" class="sentinel-chip-btn sentinel-chip-ghost sentinel-action-scale" id="clear-host" data-i18n="clear">Clear</button>
          </div>
        </div>
        <div class="sentinel-panel sentinel-panel-lift sentinel-table-wrap sentinel-fade-up">
          <table class="sentinel-data-table hosts-table sentinel-table-soft">
            <thead>
              <tr>
                <th>ID</th>
                <th data-i18n="hostname">Hostname</th>
                <th data-i18n="ip">IP</th>
                <th data-i18n="deviceType">Device Type</th>
                <th id="hosts-temperature-heading" data-i18n="temp">Temp C</th>
                <th data-i18n="dateAdded">Date Added</th>
                <th data-i18n="actions">Actions</th>
              </tr>
            </thead>
            <tbody id="hosts-table-body"></tbody>
          </table>
        </div>
      </section>

      <section id="view-live" class="sentinel-view view sentinel-stagger-enter">
        <div class="sentinel-toolbar">
          <h1 class="sentinel-view-title" data-i18n="liveTitle">Live Dashboard</h1>
          <div class="sentinel-toolbar-group">
            <button type="button" class="sentinel-chip-btn sentinel-chip-primary sentinel-action-scale" id="poll-metrics" data-i18n="pollNow">Poll Now</button>
            <button type="button" class="sentinel-chip-btn sentinel-chip-ghost sentinel-action-scale" id="refresh-metrics" data-i18n="refresh">Refresh</button>
          </div>
        </div>
        <div id="live-dashboard-root" class="sentinel-live-root sentinel-fade-up"></div>
      </section>

      <section id="view-ai" class="sentinel-view view sentinel-stagger-enter">
        <div class="sentinel-toolbar">
          <h1 class="sentinel-view-title sentinel-title-ai-wash" data-i18n="aiDecisionsTitle">AI Decisions</h1>
          <button type="button" class="sentinel-chip-btn sentinel-chip-ai sentinel-action-scale" id="refresh-ai" data-i18n="refresh">Refresh</button>
        </div>
        <div id="ai-decisions" class="sentinel-ai-stack"></div>
      </section>
    </main>
  </div>

  <div id="host-metrics-modal" class="sentinel-modal" aria-hidden="true">
    <div class="sentinel-modal-backdrop" data-dismiss-modal></div>
    <div class="sentinel-modal-panel sentinel-panel-lift sentinel-fade-up" role="dialog">
      <div class="sentinel-modal-header">
        <div>
          <div class="sentinel-modal-kicker" data-i18n="hostInsightKicker">Host insight</div>
          <div class="sentinel-modal-title" id="host-modal-heading">—</div>
        </div>
        <button type="button" class="sentinel-modal-close sentinel-action-scale" id="host-modal-dismiss" data-i18n="closeModal">Close</button>
      </div>
      <div class="sentinel-modal-controls">
        <label class="sentinel-control">
          <span data-i18n="metricPickerLabel">Metric</span>
          <select id="host-metric-scope" class="sentinel-field"></select>
        </label>
        <label class="sentinel-control">
          <span data-i18n="chartStartLabel">Start</span>
          <input type="datetime-local" id="host-metric-start" class="sentinel-field sentinel-action-scale">
        </label>
        <label class="sentinel-control">
          <span data-i18n="chartEndLabel">End</span>
          <input type="datetime-local" id="host-metric-end" class="sentinel-field sentinel-action-scale">
        </label>
        <button type="button" class="sentinel-chip-btn sentinel-chip-primary sentinel-action-scale" id="host-metric-refresh" data-i18n="loadHistory">Load</button>
      </div>
      <div class="sentinel-chart-box">
        <canvas id="host-metric-chart" height="120"></canvas>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
